name: CI — SDK

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install
      - run: bunx tsc --noEmit

  version:
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      new_version: ${{ steps.bump.outputs.new_version }}
      created: ${{ steps.bump.outputs.created }}
    steps:
      - uses: actions/checkout@v6

      - name: Read version from package.json
        id: bump
        run: |
          VERSION=$(node -p "require('./package.json').version")
          TAG="v${VERSION}"
          echo "new_version=${TAG}" >> "$GITHUB_OUTPUT"
          echo "Version: ${TAG}"

          # Check if tag already exists
          if git ls-remote --tags origin "${TAG}" | grep -q "${TAG}"; then
            echo "Tag ${TAG} already exists — skipping"
            echo "created=false" >> "$GITHUB_OUTPUT"
          else
            git tag "${TAG}"
            git push origin "${TAG}"
            echo "created=true" >> "$GITHUB_OUTPUT"
          fi

  publish:
    needs: version
    if: needs.version.outputs.created == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          registry-url: 'https://npm.pkg.github.com'
          scope: '@olympusoss'
      - run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Make package public
        run: |
          curl -sf -X PATCH \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/orgs/OlympusOSS/packages/npm/sdk" \
            -d '{"visibility":"public"}' || echo "Could not set package visibility — set manually in package settings"

  notify-downstream:
    needs: [version, publish]
    if: needs.version.outputs.created == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Trigger Athena rebuild
        uses: peter-evans/repository-dispatch@v4
        with:
          token: ${{ secrets.GHCR_PAT }}
          repository: OlympusOSS/athena
          event-type: sdk-updated
          client-payload: '{"tag": "${{ needs.version.outputs.new_version }}"}'
      - name: Trigger Hera rebuild
        uses: peter-evans/repository-dispatch@v4
        with:
          token: ${{ secrets.GHCR_PAT }}
          repository: OlympusOSS/hera
          event-type: sdk-updated
          client-payload: '{"tag": "${{ needs.version.outputs.new_version }}"}'
